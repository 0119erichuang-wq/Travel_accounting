<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="theme-color" content="#f8f9fa" id="meta-theme-color">
    <title>✈️ 隨身旅遊記帳</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <style>
        /* 主題變數 */
        :root {
            /* 淺色 */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --input-bg: #fdfdfd;
            --border-color: #dddddd;
            --btn-bg: #2ecc71;
            --btn-shadow: #229954;
            --card-shadow: rgba(0,0,0,0.08);
            --inset-shadow: rgba(0,0,0,0.15);
        }

        body.theme-dark {
            /* 暗色 */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --text-muted: #aaaaaa;
            --input-bg: #2c2c2c;
            --border-color: #444444;
            --btn-bg: #bb86fc;
            --btn-shadow: #7f39fb;
            --card-shadow: rgba(0,0,0,0.5);
            --inset-shadow: rgba(0,0,0,0.5);
        }

        body.theme-lightblue {
            /* 淡藍色 */
            --bg-color: #e0f7fa;
            --card-bg: #ffffff;
            --text-color: #006064;
            --text-muted: #00838f;
            --input-bg: #e0f2f1;
            --border-color: #b2ebf2;
            --btn-bg: #00acc1;
            --btn-shadow: #00838f;
            --card-shadow: rgba(0, 131, 143, 0.15);
            --inset-shadow: rgba(0, 131, 143, 0.2);
        }

        body.theme-lightpurple {
            /* 淡紫色 */
            --bg-color: #f3e5f5;
            --card-bg: #ffffff;
            --text-color: #4a148c;
            --text-muted: #6a1b9a;
            --input-bg: #f3e5f5;
            --border-color: #e1bee7;
            --btn-bg: #ab47bc;
            --btn-shadow: #8e24aa;
            --card-shadow: rgba(106, 27, 154, 0.15);
            --inset-shadow: rgba(106, 27, 154, 0.2);
        }

        body.theme-darkblue {
            /* 深藍色 */
            --bg-color: #0d47a1;
            --card-bg: #1565c0;
            --text-color: #ffffff;
            --text-muted: #bbdefb;
            --input-bg: #0a387d;
            --border-color: #1e88e5;
            --btn-bg: #ffca28;
            --btn-shadow: #ff8f00;
            --card-shadow: rgba(0,0,0,0.4);
            --inset-shadow: rgba(0,0,0,0.6);
        }

        body.theme-gray {
            /* 灰色 */
            --bg-color: #cfd8dc;
            --card-bg: #eceff1;
            --text-color: #263238;
            --text-muted: #546e7a;
            --input-bg: #b0bec5;
            --border-color: #90a4ae;
            --btn-bg: #546e7a;
            --btn-shadow: #37474f;
            --card-shadow: rgba(38, 50, 56, 0.2);
            --inset-shadow: rgba(38, 50, 56, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 12px; 
            font-size: 16px; 
            transition: background-color 0.3s, color 0.3s;
        }

        .container { 
            max-width: 100%; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 16px; 
            box-shadow: 0 8px 20px var(--card-shadow); 
            transition: background-color 0.3s;
            position: relative;
        }

        h2 { text-align: center; margin: 10px 0 20px 0; font-size: 22px; }
        
        .theme-btn-container {
            position: absolute;
            top: 16px;
            right: 16px;
        }
        
        .theme-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 3px 6px var(--card-shadow);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .theme-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 3px var(--card-shadow);
        }

        .theme-dropdown {
            position: absolute;
            top: 45px;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--card-shadow);
            display: none; 
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            width: 150px;
        }

        .theme-dropdown.show {
            display: flex; 
        }

        .theme-option {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-color);
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .theme-option:hover {
            background-color: var(--input-bg);
        }

        .theme-option:not(:last-child) {
            border-bottom: 1px solid var(--border-color);
        }

        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            font-size: 16px; 
            background-color: var(--input-bg); 
            color: var(--text-color);
            appearance: none; 
            -webkit-appearance: none; 
            box-shadow: inset 2px 4px 6px var(--inset-shadow), inset -2px -2px 4px rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            box-shadow: inset 4px 6px 8px var(--inset-shadow), inset -2px -2px 4px rgba(255,255,255,0.1);
        }

        select { 
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%23888'/></svg>"); 
            background-repeat: no-repeat; 
            background-position: right 14px center; 
            background-size: 12px; 
            padding-right: 35px; 
        }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        .btn-add { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--btn-bg); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
            box-shadow: 0 6px 0 var(--btn-shadow), 0 10px 15px rgba(0,0,0,0.15);
            transform: translateY(0);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-add:active {
            box-shadow: 0 0 0 var(--btn-shadow), 0 2px 5px rgba(0,0,0,0.2);
            transform: translateY(6px);
        }

        .summary { 
            background: var(--input-bg); 
            border: 2px solid var(--border-color);
            padding: 16px; 
            border-radius: 12px; 
            margin-top: 25px; 
            box-shadow: inset 2px 4px 6px var(--inset-shadow);
        }
        .summary div { margin-bottom: 6px; font-size: 14px; color: var(--text-muted); font-weight: bold;}
        .summary .total-twd { font-size: 24px; font-weight: bold; margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px; color: var(--text-color); }
        
        .record-list { margin-top: 15px; }
        .record-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 3px 6px var(--card-shadow);
        }
        .card-info { flex-grow: 1; padding-right: 8px; }
        .card-title { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .card-detail { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .card-time { font-size: 11px; color: var(--text-muted); opacity: 0.7; }
        .card-amount { text-align: right; margin-right: 12px; flex-shrink: 0; }
        .amt-foreign { font-size: 13px; color: var(--text-muted); }
        .amt-twd { font-weight: bold; font-size: 16px; }
        
        .btn-delete { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-size: 12px; 
            cursor: pointer; 
            flex-shrink: 0; 
            box-shadow: 0 3px 0 #c0392b;
            transform: translateY(0);
        }
        .btn-delete:active {
            box-shadow: 0 0 0 #c0392b;
            transform: translateY(3px);
        }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        .btn-clear { background: none; border: 1px solid #ff4757; color: #ff4757; padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ 隨身旅遊記帳</h2>
    
    <div class="theme-btn-container">
        <button class="theme-btn" onclick="toggleThemeMenu()">🎨</button>
        <div class="theme-dropdown" id="theme-menu">
            <button class="theme-option" onclick="selectTheme('light')">⚪ 淺色</button>
            <button class="theme-option" onclick="selectTheme('dark')">⚫ 暗色</button>
            <button class="theme-option" onclick="selectTheme('lightblue')">💧 淡藍色</button>
            <button class="theme-option" onclick="selectTheme('lightpurple')">🔮 淡紫色</button>
            <button class="theme-option" onclick="selectTheme('darkblue')">🌌 深藍色</button>
            <button class="theme-option" onclick="selectTheme('gray')">🗿 灰色</button>
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label for="currency">1. 選擇貨幣：</label>
            <select id="currency" onchange="updateExchangeRate()">
                <option value="0.21" data-name="日圓 (JPY)">🇯🇵 日圓 (JPY)</option>
                <option value="0.024" data-name="韓元 (KRW)">🇰🇷 韓元 (KRW)</option>
                <option value="32.5" data-name="美金 (USD)">🇺🇸 美金 (USD)</option>
                <option value="35.0" data-name="歐元 (EUR)">🇪🇺 歐元 (EUR)</option>
                <option value="4.5" data-name="人民幣 (CNY)">🇨🇳 人民幣 (CNY)</option>
                <option value="0.0012" data-name="越南盾 (VND)">🇻🇳 越南盾 (VND)</option>
                <option value="24.6" data-name="新加坡幣 (SGD)">🇸🇬 新加坡幣 (SGD)</option>
                <option value="0.96" data-name="泰銖 (THB)">🇹🇭 泰銖 (THB)</option>
                <option value="0.52" data-name="菲律賓披索 (PHP)">🇵🇭 菲律賓披索 (PHP)</option>
                <option value="1" data-name="新台幣 (TWD)">🇹🇼 新台幣 (TWD)</option>
            </select>
        </div>
        <div class="form-group" style="flex: 0.7;">
            <label for="rate">目前匯率：</label>
            <input type="number" id="rate" value="0.21" step="0.000001">
        </div>
    </div>

    <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 15px 0;">

    <div class="form-group">
        <label for="category">2. 費用分類：</label>
        <select id="category">
            <option value="👤 導遊/團費">👤 導遊/團費</option>
            <option value="🚗 交通機票">🚗 交通機票</option>
            <option value="🏨 飯店住宿">🏨 飯店住宿</option>
            <option value="🍽️ 美食餐飲">🍽️ 美食餐飲</option>
            <option value="🛍️ 購物瞎拼">🛍️ 購物瞎拼</option>
            <option value="🎟️ 門票行程">🎟️ 門票行程</option>
            <option value="📌 其他">📌 其他</option>
        </select>
    </div>

    <div class="form-group">
        <label for="detail">詳細說明：</label>
        <input type="text" id="detail" placeholder="例如：導遊小費 / 晚餐拉麵">
    </div>

    <div class="form-group">
        <label for="amount">外幣金額：</label>
        <input type="number" id="amount" placeholder="請輸入消費金額" inputmode="decimal">
    </div>

    <button class="btn-add" onclick="addRecord()">➕ 新增這筆消費</button>

    <div class="summary">
        <div>幣別：<span id="current-currency-text" style="color: var(--text-color);">日圓 (JPY)</span></div>
        <div>外幣總計：<span id="total-foreign" style="color: var(--text-color);">0</span></div>
        <div class="total-twd">台幣總計：NT$ <span id="total-twd">0</span></div>
    </div>

    <div class="header-section">
        <h3 style="margin:0; font-size:16px;">📋 消費明細</h3>
        <button class="btn-clear" onclick="clearAll()">全部清空</button>
    </div>
    
    <div class="record-list" id="record-container"></div>
</div>

<script>
    let records = [];

    window.onload = function() {
        loadTheme();
        loadFromStorage();
    };

    function toggleThemeMenu() {
        document.getElementById('theme-menu').classList.toggle('show');
    }

    window.onclick = function(event) {
        if (!event.target.matches('.theme-btn') && !event.target.matches('.theme-option')) {
            const dropdowns = document.getElementsByClassName("theme-dropdown");
            for (let i = 0; i < dropdowns.length; i++) {
                const openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }

    function selectTheme(theme) {
        document.body.className = 'theme-' + theme;
        localStorage.setItem('travel_theme', theme);
        
        document.getElementById('theme-menu').classList.remove('show');

        setTimeout(() => {
            const bgColor = getComputedStyle(document.body).getPropertyValue('background-color');
            document.getElementById('meta-theme-color').setAttribute('content', bgColor);
        }, 50);
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('travel_theme') || 'light';
        selectTheme(savedTheme);
    }

    function updateExchangeRate() {
        const currencySelect = document.getElementById('currency');
        const selectedOption = currencySelect.options[currencySelect.selectedIndex];
        document.getElementById('rate').value = selectedOption.value;
        document.getElementById('current-currency-text').innerText = selectedOption.getAttribute('data-name');
    }

    function saveToStorage() {
        localStorage.setItem('travel_records', JSON.stringify(records));
    }

    function loadFromStorage() {
        const stored = localStorage.getItem('travel_records');
        if (stored) {
            records = JSON.parse(stored);
            render();
        }
    }

    function addRecord() {
        const category = document.getElementById('category').value;
        const detail = document.getElementById('detail').value || "未填寫說明";
        const amount = parseFloat(document.getElementById('amount').value);
        const rate = parseFloat(document.getElementById('rate').value);

        if (isNaN(amount) || amount <= 0) {
            alert("請輸入正確的金額喔！");
            return;
        }

        const now = new Date();
        const formattedTime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}點${String(now.getMinutes()).padStart(2,'0')}分`;
        const timeValue = now.getTime();

        const twdAmt = Math.round(amount * rate);

        const newRecord = {
            id: Date.now(),
            timeValue: timeValue,
            timeStr: formattedTime,
            category: category,
            detail: detail,
            amount: amount,
            twdAmt: twdAmt
        };

        records.push(newRecord);
        records.sort((a, b) => b.timeValue - a.timeValue);
        
        saveToStorage();
        render();

        document.getElementById('detail').value = "";
        document.getElementById('amount').value = "";
        document.activeElement.blur();
    }

    function deleteRecord(id) {
        records = records.filter(r => r.id !== id);
        saveToStorage();
        render();
    }

    function clearAll() {
        if(confirm("確定要清空所有記帳紀錄嗎？（清除後無法復原喔！）")) {
            records = [];
            localStorage.removeItem('travel_records');
            render();
        }
    }

    function render() {
        const container = document.getElementById('record-container');
        container.innerHTML = "";

        let totalForeign = 0;
        let totalTwd = 0;

        records.forEach(r => {
            totalForeign += r.amount;
            totalTwd += r.twdAmt;

            const card = document.createElement('div');
            card.className = 'record-card';
            card.innerHTML = `
                <div class="card-info">
                    <div class="card-title">${r.category}</div>
                    <div class="card-detail">${r.detail}</div>
                    <div class="card-time">📅 ${r.timeStr}</div>
                </div>
                <div class="card-amount">
                    <div class="amt-foreign">${r.amount.toLocaleString()}</div>
                    <div class="amt-twd">NT$ ${r.twdAmt.toLocaleString()}</div>
                </div>
                <button class="btn-delete" onclick="deleteRecord(${r.id})">刪除</button>
            `;
            container.appendChild(card);
        });

        document.getElementById('total-foreign').innerText = totalForeign.toLocaleString();
        document.getElementById('total-twd').innerText = totalTwd.toLocaleString();
    }
</script>

</body>
</html>
