<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="theme-color" content="#f8f9fa" id="meta-theme-color">
    <title>✈️ 隨身旅遊記帳</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        /* 主題變數 */
        :root {
            /* 淺色 */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --input-bg: #fdfdfd;
            --border-color: #dddddd;
            --btn-bg: #2ecc71;
            --btn-shadow: #229954;
            --card-shadow: rgba(0,0,0,0.08);
            --inset-shadow: rgba(0,0,0,0.15);
        }

        body.theme-dark {
            /* 暗色 */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --text-muted: #aaaaaa;
            --input-bg: #2c2c2c;
            --border-color: #444444;
            --btn-bg: #bb86fc;
            --btn-shadow: #7f39fb;
            --card-shadow: rgba(0,0,0,0.5);
            --inset-shadow: rgba(0,0,0,0.5);
        }

        body.theme-lightblue {
            /* 淡藍色 */
            --bg-color: #e0f7fa;
            --card-bg: #ffffff;
            --text-color: #006064;
            --text-muted: #00838f;
            --input-bg: #e0f2f1;
            --border-color: #b2ebf2;
            --btn-bg: #00acc1;
            --btn-shadow: #00838f;
            --card-shadow: rgba(0, 131, 143, 0.15);
            --inset-shadow: rgba(0, 131, 143, 0.2);
        }

        body.theme-lightpurple {
            /* 淡紫色 */
            --bg-color: #f3e5f5;
            --card-bg: #ffffff;
            --text-color: #4a148c;
            --text-muted: #6a1b9a;
            --input-bg: #f3e5f5;
            --border-color: #e1bee7;
            --btn-bg: #ab47bc;
            --btn-shadow: #8e24aa;
            --card-shadow: rgba(106, 27, 154, 0.15);
            --inset-shadow: rgba(106, 27, 154, 0.2);
        }

        body.theme-darkblue {
            /* 深藍色 */
            --bg-color: #0d47a1;
            --card-bg: #1565c0;
            --text-color: #ffffff;
            --text-muted: #bbdefb;
            --input-bg: #0a387d;
            --border-color: #1e88e5;
            --btn-bg: #ffca28;
            --btn-shadow: #ff8f00;
            --card-shadow: rgba(0,0,0,0.4);
            --inset-shadow: rgba(0,0,0,0.6);
        }

        body.theme-gray {
            /* 灰色 */
            --bg-color: #cfd8dc;
            --card-bg: #eceff1;
            --text-color: #263238;
            --text-muted: #546e7a;
            --input-bg: #b0bec5;
            --border-color: #90a4ae;
            --btn-bg: #546e7a;
            --btn-shadow: #37474f;
            --card-shadow: rgba(38, 50, 56, 0.2);
            --inset-shadow: rgba(38, 50, 56, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 12px; 
            font-size: 16px; 
            transition: background-color 0.3s, color 0.3s;
        }

        .container { 
            max-width: 100%; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 16px; 
            box-shadow: 0 8px 20px var(--card-shadow); 
            transition: background-color 0.3s;
            position: relative;
        }

        h2 { text-align: center; margin: 10px 0 20px 0; font-size: 22px; }
        
        .theme-btn-container {
            position: absolute;
            top: 16px;
            right: 16px;
        }
        
        .theme-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 3px 6px var(--card-shadow);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .theme-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 3px var(--card-shadow);
        }

        .theme-dropdown {
            position: absolute;
            top: 45px;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--card-shadow);
            display: none; 
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            width: 150px;
        }

        .theme-dropdown.show {
            display: flex; 
        }

        .theme-option {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-color);
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .theme-option:hover {
            background-color: var(--input-bg);
        }

        .theme-option:not(:last-child) {
            border-bottom: 1px solid var(--border-color);
        }

        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            font-size: 16px; 
            background-color: var(--input-bg); 
            color: var(--text-color);
            appearance: none; 
            -webkit-appearance: none; 
            box-shadow: inset 2px 4px 6px var(--inset-shadow), inset -2px -2px 4px rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            box-shadow: inset 4px 6px 8px var(--inset-shadow), inset -2px -2px 4px rgba(255,255,255,0.1);
        }

        select { 
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%23888'/></svg>"); 
            background-repeat: no-repeat; 
            background-position: right 14px center; 
            background-size: 12px; 
            padding-right: 35px; 
        }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        .btn-add { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--btn-bg); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
            box-shadow: 0 6px 0 var(--btn-shadow), 0 10px 15px rgba(0,0,0,0.15);
            transform: translateY(0);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-add:active {
            box-shadow: 0 0 0 var(--btn-shadow), 0 2px 5px rgba(0,0,0,0.2);
            transform: translateY(6px);
        }

        .summary { 
            background: var(--input-bg); 
            border: 2px solid var(--border-color);
            padding: 16px; 
            border-radius: 12px; 
            margin-top: 25px; 
            box-shadow: inset 2px 4px 6px var(--inset-shadow);
        }
        .summary div { margin-bottom: 6px; font-size: 14px; color: var(--text-muted); font-weight: bold;}
        .summary .total-twd { font-size: 24px; font-weight: bold; margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px; color: var(--text-color); }
        
        .record-list { margin-top: 15px; }
        .record-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 3px 6px var(--card-shadow);
        }
        .card-info { flex-grow: 1; padding-right: 8px; }
        .card-title { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .card-detail { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .card-time { font-size: 11px; color: var(--text-muted); opacity: 0.7; }
        .card-amount { text-align: right; margin-right: 12px; flex-shrink: 0; }
        .amt-foreign { font-size: 13px; color: var(--text-muted); }
        .amt-twd { font-weight: bold; font-size: 16px; }
        
        .btn-delete { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-size: 12px; 
            cursor: pointer; 
            flex-shrink: 0; 
            box-shadow: 0 3px 0 #c0392b;
            transform: translateY(0);
        }
        .btn-delete:active {
            box-shadow: 0 0 0 #c0392b;
            transform: translateY(3px);
        }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        .btn-clear { background: none; border: 1px solid #ff4757; color: #ff4757; padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }

        /* 🔔 更新內容公告彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1; pointer-events: auto;
        }
        .modal-content {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 24px;
            border-radius: 20px;
            max-width: 88%;
            width: 380px;
            box-shadow: 0 15px 30px var(--card-shadow);
            text-align: left;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 { margin-top: 0; color: var(--btn-bg); font-size: 20px; text-align: center; margin-bottom: 15px;}
        .modal-body { margin: 15px 0; font-size: 14px; line-height: 1.6; }
        .modal-body ul { padding-left: 20px; margin: 0; }
        .modal-body li { margin-bottom: 12px; }
        .btn-modal-close {
            width: 100%; padding: 14px;
            background: var(--btn-bg); color: white;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 var(--btn-shadow);
            transition: transform 0.1s;
        }
        .btn-modal-close:active {
            transform: translateY(4px); box-shadow: 0 1px 0 var(--btn-shadow);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ 隨身旅遊記帳</h2>
    
    <div class="theme-btn-container">
        <button class="theme-btn" onclick="toggleThemeMenu()">🎨</button>
        <div class="theme-dropdown" id="theme-menu">
            <button class="theme-option" onclick="selectTheme('light')">⚪ 淺色</button>
            <button class="theme-option" onclick="selectTheme('dark')">⚫ 暗色</button>
            <button class="theme-option" onclick="selectTheme('lightblue')">💧 淡藍色</button>
            <button class="theme-option" onclick="selectTheme('lightpurple')">🔮 淡紫色</button>
            <button class="theme-option" onclick="selectTheme('darkblue')">🌌 深藍色</button>
            <button class="theme-option" onclick="selectTheme('gray')">🗿 灰色</button>
        </div>
    </div>

    <div class="form-group">
        <label>1. 搜尋與選擇貨幣：</label>
        <input type="text" id="currency-search" placeholder="🔍 輸入關鍵字搜尋 (如: 歐元、USD、日圓)..." oninput="filterCurrencies()" style="margin-bottom: 10px; font-size: 14px; padding: 12px;">
        <div class="row">
            <div class="form-group" style="flex: 1.3; margin-bottom: 0;">
                <select id="currency" onchange="updateExchangeRate()">
                    </select>
            </div>
            <div class="form-group" style="flex: 0.7; margin-bottom: 0;">
                <input type="number" id="rate" value="0.21" step="0.000001">
            </div>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 15px 0;">

    <div class="form-group">
        <label for="category">2. 費用分類：</label>
        <select id="category">
            <option value="👤 導遊/團費">👤 導遊/團費</option>
            <option value="🚗 交通機票">🚗 交通機票</option>
            <option value="🏨 飯店住宿">🏨 飯店住宿</option>
            <option value="🍽️ 美食餐飲">🍽️ 美食餐飲</option>
            <option value="🛍️ 購物瞎拼">🛍️ 購物瞎拼</option>
            <option value="🎟️ 門票行程">🎟️ 門票行程</option>
            <option value="📌 其他">📌 其他</option>
        </select>
    </div>

    <div class="form-group">
        <label for="detail">詳細說明：</label>
        <input type="text" id="detail" placeholder="例如：導遊小費 / 晚餐拉麵">
    </div>

    <div class="form-group">
        <label for="amount">外幣金額：</label>
        <input type="number" id="amount" placeholder="請輸入消費金額" inputmode="decimal">
    </div>

    <button class="btn-add" onclick="addRecord()">➕ 新增這筆消費</button>

    <div class="summary">
        <div>幣別：<span id="current-currency-text" style="color: var(--text-color); font-weight: bold;">-</span></div>
        <div>外幣總計：<span id="total-foreign" style="color: var(--text-color);">0</span></div>
        <div class="total-twd">台幣總計：NT$ <span id="total-twd">0</span></div>
    </div>

    <div class="header-section">
        <h3 style="margin:0; font-size:16px;">📋 消費明細</h3>
        <button class="btn-clear" onclick="clearAll()">全部清空</button>
    </div>
    
    <div class="record-list" id="record-container"></div>
</div>

<div id="update-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>🚀 功能重大升級通知</h3>
        <div class="modal-body">
            <ul>
                <li>🌍 <b>全球貨幣支援</b>：內建擴充全球 35+ 種主流旅遊國家貨幣，帶到哪都能輕鬆記帳！</li>
                <li>🔍 <b>貨幣智慧搜尋</b>：新增專屬搜尋框，輸入中文或貨幣代碼（如：歐元、USD）即可快速過濾。</li>
                <li>🔔 <b>更新公告通知</b>：未來若有新功能上線將會自動提醒，點擊下方按鈕後便不會再重覆打擾。</li>
            </ul>
        </div>
        <button class="btn-modal-close" onclick="closeUpdateModal()">我知道了</button>
    </div>
</div>

<script>
    // 🔔 應用程式版本號（未來有大更新只要改這個，公告就會重新跳出來一次）
    const APP_VERSION = "2.5.0";

    // 全球貨幣數據庫
    const currencyData = [
        { code: "JPY", name: "日圓 (JPY)", rate: 0.21, flag: "🇯🇵" },
        { code: "KRW", name: "韓元 (KRW)", rate: 0.024, flag: "🇰🇷" },
        { code: "USD", name: "美金 (USD)", rate: 32.5, flag: "🇺🇸" },
        { code: "EUR", name: "歐元 (EUR)", rate: 35.0, flag: "🇪🇺" },
        { code: "CNY", name: "人民幣 (CNY)", rate: 4.5, flag: "🇨🇳" },
        { code: "THB", name: "泰銖 (THB)", rate: 0.96, flag: "🇹🇭" },
        { code: "HKD", name: "港幣 (HKD)", rate: 4.15, flag: "🇭🇰" },
        { code: "GBP", name: "英鎊 (GBP)", rate: 41.2, flag: "🇬🇧" },
        { code: "AUD", name: "澳幣 (AUD)", rate: 21.3, flag: "🇦🇺" },
        { code: "CAD", name: "加幣 (CAD)", rate: 23.8, flag: "🇨🇦" },
        { code: "SGD", name: "新加坡幣 (SGD)", rate: 24.1, flag: "🇸🇬" },
        { code: "VND", name: "越南盾 (VND)", rate: 0.0012, flag: "🇻🇳" },
        { code: "PHP", name: "菲律賓披索 (PHP)", rate: 0.56, flag: "🇵🇭" },
        { code: "MYR", name: "馬來西亞林吉特 (MYR)", rate: 6.9, flag: "🇲🇾" },
        { code: "IDR", name: "印尼盾 (IDR)", rate: 0.002, flag: "🇮🇩" },
        { code: "CHF", name: "瑞士法郎 (CHF)", rate: 36.8, flag: "🇨🇭" },
        { code: "NZD", name: "紐西蘭幣 (NZD)", rate: 19.2, flag: "🇳🇿" },
        { code: "MOP", name: "澳門幣 (MOP)", rate: 4.03, flag: "🇲🇴" },
        { code: "SEK", name: "瑞典克朗 (SEK)", rate: 3.05, flag: "🇸🇪" },
        { code: "NOK", name: "挪威克朗 (NOK)", rate: 3.01, flag: "🇳🇴" },
        { code: "DKK", name: "丹麥克朗 (DKK)", rate: 4.68, flag: "🇩🇰" },
        { code: "INR", name: "印度盧比 (INR)", rate: 0.39, flag: "🇮🇳" },
        { code: "TRY", name: "土耳其里拉 (TRY)", rate: 0.95, flag: "🇹🇷" },
        { code: "AED", name: "阿聯酋迪拉姆 (AED)", rate: 8.85, flag: "🇦🇪" },
        { code: "ZAR", name: "南非蘭特 (ZAR)", rate: 1.75, flag: "🇿🇦" },
        { code: "BRL", name: "巴西雷亞爾 (BRL)", rate: 5.8, flag: "🇧🇷" },
        { code: "MXN", name: "墨西哥比索 (MXN)", rate: 1.8, flag: "🇲🇽" },
        { code: "PLN", name: "波蘭茲羅提 (PLN)", rate: 8.1, flag: "🇵🇱" },
        { code: "CZK", name: "捷克克朗 (CZK)", rate: 1.38, flag: "🇨🇿" },
        { code: "EGP", name: "埃及鎊 (EGP)", rate: 0.66, flag: "🇪🇬" },
        { code: "SAR", name: "沙烏地里亞爾 (SAR)", rate: 8.66, flag: "🇸🇦" },
        { code: "FJD", name: "斐濟元 (FJD)", rate: 14.3, flag: "🇫🇯" },
        { code: "KHR", name: "柬埔寨瑞爾 (KHR)", rate: 0.0079, flag: "🇰🇭" },
        { code: "LAK", name: "寮國基普 (LAK)", rate: 0.0015, flag: "🇱🇦" },
        { code: "MMK", name: "緬甸元 (MMK)", rate: 0.015, flag: "🇲🇲" },
        { code: "TWD", name: "新台幣 (TWD)", rate: 1.0, flag: "🇹🇼" }
    ];

    let records = [];

    window.onload = function() {
        checkUpdateModal();
        loadTheme();
        initCurrencies();
        loadFromStorage();
    };

    // 🔔 檢查並顯示更新公告彈窗
    function checkUpdateModal() {
        const savedVersion = localStorage.getItem('app_last_version');
        if (savedVersion !== APP_VERSION) {
            document.getElementById('update-modal').classList.add('show');
        }
    }

    // 🔔 關閉更新公告彈窗並記錄版本
    function closeUpdateModal() {
        localStorage.setItem('app_last_version', APP_VERSION);
        document.getElementById('update-modal').classList.remove('show');
    }

    // 初始化載入貨幣選單
    function initCurrencies() {
        renderCurrencies('');
    }

    // 🔍 篩選與渲染貨幣選項
    function filterCurrencies() {
        const keyword = document.getElementById('currency-search').value;
        renderCurrencies(keyword);
    }

    function renderCurrencies(filterText) {
        const select = document.getElementById('currency');
        const previousValue = select.value; // 記住篩選前的選擇
        select.innerHTML = '';

        const filtered = currencyData.filter(c => 
            c.name.toLowerCase().includes(filterText.toLowerCase()) || 
            c.code.toLowerCase().includes(filterText.toLowerCase())
        );

        if(filtered.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = "❌ 找不到該貨幣";
            opt.value = "";
            select.appendChild(opt);
            return;
        }

        filtered.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.code;
            opt.textContent = `${c.flag} ${c.name}`;
            select.appendChild(opt);
        });

        // 如果之前的選擇依然在篩選列表內，就保留選擇；否則選第一個
        const hasPrevious = [...select.options].some(o => o.value === previousValue);
        if (hasPrevious) {
            select.value = previousValue;
        } else {
            select.selectedIndex = 0;
        }
        updateExchangeRate();
    }

    function updateExchangeRate() {
        const select = document.getElementById('currency');
        const selectedCode = select.value;
        if (!selectedCode) return;

        const currentCurrency = currencyData.find(c => c.code === selectedCode);
        if (currentCurrency) {
            document.getElementById('rate').value = currentCurrency.rate;
            document.getElementById('current-currency-text').innerText = `${currentCurrency.flag} ${currentCurrency.name}`;
        }
    }

    // 🎨 主題控制
    function toggleThemeMenu() {
        document.getElementById('theme-menu').classList.toggle('show');
    }

    window.onclick = function(event) {
        if (!event.target.matches('.theme-btn') && !event.target.matches('.theme-option')) {
            const dropdowns = document.getElementsByClassName("theme-dropdown");
            for (let i = 0; i < dropdowns.length; i++) {
                const openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }

    function selectTheme(theme) {
        document.body.className = 'theme-' + theme;
        localStorage.setItem('travel_theme', theme);
        document.getElementById('theme-menu').classList.remove('show');
        setTimeout(() => {
            const bgColor = getComputedStyle(document.body).getPropertyValue('background-color');
            document.getElementById('meta-theme-color').setAttribute('content', bgColor);
        }, 50);
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('travel_theme') || 'light';
        selectTheme(savedTheme);
    }

    function saveToStorage() {
        localStorage.setItem('travel_records', JSON.stringify(records));
    }

    function loadFromStorage() {
        const stored = localStorage.getItem('travel_records');
        if (stored) {
            records = JSON.parse(stored);
            render();
        }
    }

    function addRecord() {
        const select = document.getElementById('currency');
        if(!select.value) {
            alert("請先選擇有效的貨幣！");
            return;
        }
        const category = document.getElementById('category').value;
        const detail = document.getElementById('detail').value || "未填寫說明";
        const amount = parseFloat(document.getElementById('amount').value);
        const rate = parseFloat(document.getElementById('rate').value);

        if (isNaN(amount) || amount <= 0) {
            alert("請輸入正確的金額喔！");
            return;
        }

        const now = new Date();
        const formattedTime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}點${String(now.getMinutes()).padStart(2,'0')}分`;
        
        const twdAmt = Math.round(amount * rate);

        const newRecord = {
            id: Date.now(),
            timeValue: now.getTime(),
            timeStr: formattedTime,
            category: category,
            detail: detail,
            amount: amount,
            twdAmt: twdAmt
        };

        records.push(newRecord);
        records.sort((a, b) => b.timeValue - a.timeValue);
        
        saveToStorage();
        render();

        document.getElementById('detail').value = "";
        document.getElementById('amount').value = "";
        document.activeElement.blur();
    }

    function deleteRecord(id) {
        records = records.filter(r => r.id !== id);
        saveToStorage();
        render();
    }

    function clearAll() {
        if(confirm("確定要清空所有記帳紀錄嗎？（清除後無法復原喔！）")) {
            records = [];
            localStorage.removeItem('travel_records');
            render();
        }
    }

    function render() {
        const container = document.getElementById('record-container');
        container.innerHTML = "";

        let totalForeign = 0;
        let totalTwd = 0;

        records.forEach(r => {
            totalForeign += r.amount;
            totalTwd += r.twdAmt;

            const card = document.createElement('div');
            card.className = 'record-card';
            card.innerHTML = `
                <div class="card-info">
                    <div class="card-title">${r.category}</div>
                    <div class="card-detail">${r.detail}</div>
                    <div class="card-time">📅 ${r.timeStr}</div>
                </div>
                <div class="card-amount">
                    <div class="amt-foreign">${r.amount.toLocaleString()}</div>
                    <div class="amt-twd">NT$ ${r.twdAmt.toLocaleString()}</div>
                </div>
                <button class="btn-delete" onclick="deleteRecord(${r.id})">刪除</button>
            `;
            container.appendChild(card);
        });

        document.getElementById('total-foreign').innerText = totalForeign.toLocaleString();
        document.getElementById('total-twd').innerText = totalTwd.toLocaleString();
    }
</script>

</body>
</html>
